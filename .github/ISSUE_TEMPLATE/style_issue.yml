name: "💄 Style"
description: "UI 디자인 변경"
labels: ["style"]
title: "[Style]: "
body:
  - type: textarea
    attributes:
      label: 🎯 변경 범위
      description: UI 변경이 필요한 범위를 설명해주세요.
      placeholder: "어떤 컴포넌트의 어떤 부분을 변경하나요?"
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🎨 디자인 상세
      description: 변경하고자 하는 디자인에 대해 설명해주세요.
      placeholder: "색상, 레이아웃, 간격 등 구체적으로 작성해주세요."
    validations:
      required: false
  - type: textarea
    attributes:
      label: 📎 참고 자료
      description: 디자인 시안이나 참고 이미지가 있다면 첨부해주세요.
    validations:
      required: false
