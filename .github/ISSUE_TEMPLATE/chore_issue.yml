name: "🛠️ Chore"
description: "환경 설정 변경"
labels: ["chore"]
title: "[Chore]: "
body:
  - type: textarea
    attributes:
      label: 📄 설정 변경 내용
      description: 변경하고자 하는 환경 설정에 대해 설명해주세요.
      placeholder: "예: 폰트 변경, 이미지 에셋 추가, 패키지 업데이트 등"
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업 항목
      description: 진행할 설정 변경 항목을 체크박스로 작성해주세요.
      placeholder: "- [ ] package.json 의존성 업데이트\n- [ ] 폰트 파일 추가"
    validations:
      required: false
  - type: textarea
    attributes:
      label: 💡 변경 사유
      description: 환경 설정을 변경하게 된 이유나 배경을 설명해주세요.
    validations:
      required: false
