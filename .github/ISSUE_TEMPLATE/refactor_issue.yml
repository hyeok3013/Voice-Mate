name: "🚧 Refactor"
description: "코드 리팩터링"
labels: ["refactor"]
title: "[Refactor]: "
body:
  - type: textarea
    attributes:
      label: 📄 리팩터링 내용
      description: 개선하고자 하는 코드의 리팩터링 내용에 대해 설명해주세요.
      placeholder: "예: 중복 코드 제거, 클래스 구조 개선, 성능 최적화 등"
    validations:
      required: true

  - type: textarea
    attributes:
      label: ✅ 작업 항목
      description: 진행할 리팩터링 항목을 체크박스로 작성해주세요.
      placeholder: "- [ ] UserService 클래스 메소드 분리\n- [ ] 중복된 유효성 검사 로직 통합\n- [ ] 불필요한 반복문 최적화"
    validations:
      required: false

  - type: textarea
    attributes:
      label: 💡 리팩터링 사유
      description: 해당 부분을 리팩터링하게 된 이유나 기대효과를 설명해주세요.
      placeholder: "코드의 가독성 향상, 유지보수성 개선, 성능 최적화 등"
    validations:
      required: false